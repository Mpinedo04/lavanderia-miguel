    <circle cx="223" cy="108" r="13" fill="#ffd53d" stroke="#ffffff" stroke-width="5"/>
    <rect x="254" y="87" width="94" height="42" rx="8" fill="#171f26" stroke="#ffca63" stroke-width="4"/>
    <rect x="268" y="99" width="52" height="8" rx="4" fill="#ff9d2f"/>
    <rect x="268" y="113" width="37" height="5" rx="2.5" fill="#ffffff" opacity="0.55"/>
    <circle cx="410" cy="108" r="24" fill="#fffaf0" stroke="#e3a05b" stroke-width="5"/>
    <path d="M410 108V91M410 108l14-7" fill="none" stroke="#4e2018" stroke-width="6" stroke-linecap="round"/>
    <circle cx="410" cy="108" r="5" fill="#ef4b33"/>

    <circle cx="333" cy="307" r="127" fill="url(#dryer-metal)" stroke="#171f26" stroke-width="8"/>
    <circle cx="333" cy="307" r="110" fill="#2c1513" stroke="#fff3d6" stroke-width="6"/>
    <circle cx="333" cy="307" r="102" fill="url(#dryer-glass)"/>

