<svg width="100%" viewBox="0 0 680 520" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Icono de secadora mejorado</title>
  <desc>Ilustración detallada de una secadora con tambor, ondas de aire caliente y flecha de rotación</desc>

  <defs>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0EDE8"/>
      <stop offset="100%" stop-color="#D0C8BC"/>
    </linearGradient>
    <linearGradient id="bodyShade" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.07"/>
    </linearGradient>
    <radialGradient id="drumRadial" cx="38%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#7a5530"/>
      <stop offset="35%" stop-color="#4a3018"/>
      <stop offset="100%" stop-color="#1e1208"/>
    </radialGradient>
    <radialGradient id="glassShine" cx="30%" cy="25%" r="65%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5"/>
      <stop offset="55%" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Ondas de calor: gradientes naranja/ámbar que se desvanecen en los extremos -->
    <linearGradient id="wave1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff6010" stop-opacity="0"/>
      <stop offset="15%"  stop-color="#ff6010" stop-opacity="0.95"/>
      <stop offset="85%"  stop-color="#ffaa30" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffaa30" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wave2Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ff8820" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#ff8820" stop-opacity="0.75"/>
      <stop offset="80%"  stop-color="#ffc050" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#ffc050" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="wave3Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffaa40" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#ffaa40" stop-opacity="0.55"/>
      <stop offset="75%"  stop-color="#ffd080" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffd080" stop-opacity="0"/>
    </linearGradient>
    <!-- Gradiente para la flecha de rotación en tono cálido anaranjado -->
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#d04008"/>
      <stop offset="100%" stop-color="#e86020"/>
    </linearGradient>
    <clipPath id="drumClip">
      <circle cx="340" cy="300" r="108"/>
    </clipPath>
  </defs>

  <!-- Sombra -->
  <ellipse cx="340" cy="468" rx="118" ry="10" fill="#000000" opacity="0.10"/>

  <!-- Cuerpo -->
  <rect x="200" y="80" width="280" height="380" rx="22" fill="url(#bodyGrad)"/>
  <rect x="200" y="80" width="280" height="380" rx="22" fill="url(#bodyShade)"/>
  <rect x="200" y="80" width="280" height="380" rx="22" fill="none" stroke="#b0a898" stroke-width="1.5"/>
  <path d="M222 80 Q200 80 200 102" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
  <line x1="200" y1="102" x2="200" y2="200" stroke="#ffffff" stroke-width="1.5" opacity="0.3"/>

  <!-- Panel superior -->
  <rect x="200" y="80" width="280" height="88" rx="22" fill="#E2DDD5" opacity="0.9"/>
  <rect x="200" y="148" width="280" height="6" fill="#b8b0a0" opacity="0.35"/>
  <line x1="210" y1="168" x2="470" y2="168" stroke="#a09888" stroke-width="0.75" opacity="0.6"/>

  <!-- Dial de temperatura -->
  <circle cx="238" cy="122" r="20" fill="#D8D0C4" stroke="#a09888" stroke-width="1"/>
  <circle cx="238" cy="122" r="14" fill="#C8BFB0" stroke="#908878" stroke-width="0.75"/>
  <line x1="238" y1="104" x2="238" y2="109" stroke="#707060" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="252" y1="108" x2="249" y2="112" stroke="#707060" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="256" y1="122" x2="251" y2="122" stroke="#707060" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="224" y1="108" x2="227" y2="112" stroke="#707060" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="220" y1="122" x2="225" y2="122" stroke="#707060" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Aguja temperatura: naranja/rojo -->
  <line x1="238" y1="122" x2="248" y2="113" stroke="#c04010" stroke-width="2" stroke-linecap="round"/>
  <circle cx="238" cy="122" r="2.5" fill="#808070"/>

  <!-- Dial de tiempo -->
  <circle cx="444" cy="122" r="20" fill="#D8D0C4" stroke="#a09888" stroke-width="1"/>
  <circle cx="444" cy="122" r="14" fill="#C8BFB0" stroke="#908878" stroke-width="0.75"/>
  <line x1="444" y1="104" x2="444" y2="109" stroke="#707060" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="458" y1="108" x2="455" y2="112" stroke="#707060" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="462" y1="122" x2="457" y2="122" stroke="#707060" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="430" y1="108" x2="433" y2="112" stroke="#707060" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="426" y1="122" x2="431" y2="122" stroke="#707060" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Aguja tiempo: tono gris cálido (corregido, antes era azul) -->
  <line x1="444" y1="122" x2="444" y2="111" stroke="#806040" stroke-width="2" stroke-linecap="round"/>
  <circle cx="444" cy="122" r="2.5" fill="#808070"/>

  <!-- Botones -->
  <rect x="278" y="110" width="88" height="26" rx="6" fill="#C8C0B0" stroke="#a09888" stroke-width="0.75"/>
  <circle cx="298" cy="123" r="7" fill="#e85050" stroke="#b03030" stroke-width="0.75"/>
  <circle cx="322" cy="123" r="7" fill="#50a870" stroke="#307050" stroke-width="0.75"/>
  <circle cx="346" cy="123" r="7" fill="#5080d0" stroke="#305898" stroke-width="0.75"/>
  <circle cx="296" cy="121" r="2.5" fill="#ffffff" opacity="0.45"/>
  <circle cx="320" cy="121" r="2.5" fill="#ffffff" opacity="0.45"/>
  <circle cx="344" cy="121" r="2.5" fill="#ffffff" opacity="0.45"/>

  <!-- Bisel puerta -->
  <circle cx="340" cy="300" r="124" fill="#a8a098" stroke="#888078" stroke-width="1"/>
  <circle cx="340" cy="300" r="120" fill="#b8b0a0" stroke="#989080" stroke-width="0.75"/>
  <circle cx="340" cy="300" r="114" fill="#2a2820" stroke="#1e1c16" stroke-width="1.5"/>
  <circle cx="340" cy="300" r="110" fill="#222018" stroke="#181610" stroke-width="0.75"/>

  <!-- Interior del tambor -->
  <circle cx="340" cy="300" r="108" fill="url(#drumRadial)"/>
  <circle cx="340" cy="300" r="90" fill="none" stroke="#3a2410" stroke-width="2" opacity="0.5"/>
  <circle cx="340" cy="300" r="70" fill="none" stroke="#2a1a0c" stroke-width="1" opacity="0.35"/>

  <!-- Aletas del tambor -->
  <path d="M340 198 Q352 210 348 230 Q344 248 340 252 Q336 248 332 230 Q328 210 340 198" fill="#3a2810" stroke="#2a1808" stroke-width="0.75" opacity="0.7"/>
  <path d="M432 356 Q418 350 406 334 Q396 318 398 314 Q402 312 418 322 Q436 334 438 344 Z" fill="#3a2810" stroke="#2a1808" stroke-width="0.75" opacity="0.7"/>
  <path d="M248 356 Q262 350 274 334 Q284 318 282 314 Q278 312 262 322 Q244 334 242 344 Z" fill="#3a2810" stroke="#2a1808" stroke-width="0.75" opacity="0.7"/>

  <!-- Ropa -->
  <ellipse cx="355" cy="310" rx="28" ry="16" fill="#6a4428" opacity="0.5" transform="rotate(-20 355 310)"/>
  <ellipse cx="318" cy="295" rx="22" ry="12" fill="#7a5030" opacity="0.4" transform="rotate(15 318 295)"/>
  <ellipse cx="348" cy="276" rx="18" ry="10" fill="#8a5c30" opacity="0.35" transform="rotate(-35 348 276)"/>

  <!-- ONDAS DE CALOR — sinusoidales, recortadas al tambor -->
  <!-- Onda 1: más intensa, más caliente -->
  <path d="M250 292 C268 278 282 308 300 296 C318 284 330 312 350 300 C370 288 384 314 404 302 C416 296 424 304 432 300"
        fill="none" stroke="url(#wave1Grad)" stroke-width="3.2"
        stroke-linecap="round" stroke-linejoin="round"
        clip-path="url(#drumClip)"/>
  <!-- Onda 2: intensidad media -->
  <path d="M255 314 C272 302 288 326 308 314 C328 302 338 324 360 314 C378 306 392 322 414 314 C420 311 426 316 432 313"
        fill="none" stroke="url(#wave2Grad)" stroke-width="2.5"
        stroke-linecap="round" stroke-linejoin="round"
        clip-path="url(#drumClip)"/>
  <!-- Onda 3: más suave, más disipada -->
  <path d="M260 334 C278 324 292 344 314 334 C334 324 346 340 368 332 C386 326 398 338 418 332"
        fill="none" stroke="url(#wave3Grad)" stroke-width="2"
        stroke-linecap="round" stroke-linejoin="round"
        clip-path="url(#drumClip)"/>

  <!-- Brillo del cristal -->
  <ellipse cx="316" cy="268" rx="44" ry="28" fill="url(#glassShine)" clip-path="url(#drumClip)"/>
  <ellipse cx="308" cy="260" rx="16" ry="10" fill="#ffffff" opacity="0.15" clip-path="url(#drumClip)"/>

  <!-- Indicador de calor -->
  <circle cx="236" cy="208" r="18" fill="#e85010" stroke="#c03008" stroke-width="1"/>
  <circle cx="232" cy="204" r="5" fill="#ffcc60" opacity="0.8"/>
  <line x1="236" y1="186" x2="236" y2="192" stroke="#f07020" stroke-width="2" stroke-linecap="round"/>
  <line x1="250" y1="190" x2="246" y2="195" stroke="#f07020" stroke-width="2" stroke-linecap="round"/>
  <line x1="256" y1="204" x2="250" y2="204" stroke="#f07020" stroke-width="2" stroke-linecap="round"/>
  <line x1="222" y1="190" x2="226" y2="195" stroke="#f07020" stroke-width="2" stroke-linecap="round"/>
  <line x1="216" y1="204" x2="222" y2="204" stroke="#f07020" stroke-width="2" stroke-linecap="round"/>

  <!-- Flecha de rotación — ahora en tono cálido anaranjado en lugar de azul -->
  <path d="M418 190 A68 68 0 0 1 458 248"
        fill="none" stroke="url(#arrowGrad)" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Punta de flecha -->
  <path d="M453 242 L462 252 L448 255"
        fill="none" stroke="#d04008" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Cola de flecha -->
  <path d="M406 178 L424 178 L424 196"
        fill="none" stroke="#d04008" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Tirador de puerta -->
  <rect x="390" y="344" width="34" height="11" rx="5.5" fill="#a8a098" stroke="#888078" stroke-width="1"/>
  <rect x="392" y="346" width="30" height="7" rx="3.5" fill="#c0b8a8" opacity="0.65"/>

  <!-- Patas -->
  <rect x="228" y="452" width="30" height="8" rx="3" fill="#a09888"/>
  <rect x="422" y="452" width="30" height="8" rx="3" fill="#a09888"/>
</svg>
