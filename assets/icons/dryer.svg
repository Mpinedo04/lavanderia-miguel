<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" role="img" aria-labelledby="dryer-title dryer-desc">
  <title id="dryer-title">Secadora rápida</title>
  <desc id="dryer-desc">Secadora frontal moderna con tambor cálido y ropa en movimiento</desc>
  <defs>
    <linearGradient id="dryer-case" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.54" stop-color="#f8f8f5"/>
      <stop offset="1" stop-color="#cfd8dd"/>
    </linearGradient>
    <linearGradient id="dryer-side" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ccd5da"/>
      <stop offset="1" stop-color="#7b8d97"/>
    </linearGradient>
    <linearGradient id="dryer-panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5a2316"/>
      <stop offset="0.48" stop-color="#be4527"/>
      <stop offset="1" stop-color="#ff9d2f"/>
    </linearGradient>
    <radialGradient id="dryer-glass" cx="38%" cy="30%" r="77%">
      <stop offset="0" stop-color="#ffd792"/>
      <stop offset="0.38" stop-color="#ff9b38"/>
      <stop offset="0.75" stop-color="#b63b20"/>
      <stop offset="1" stop-color="#3b1713"/>
    </radialGradient>
    <linearGradient id="dryer-metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff9ec"/>
      <stop offset="0.25" stop-color="#f7b55c"/>
      <stop offset="0.5" stop-color="#fff7df"/>
      <stop offset="1" stop-color="#b54c2c"/>
    </linearGradient>
    <clipPath id="dryer-drum-clip">
      <circle cx="333" cy="307" r="104"/>
    </clipPath>
    <filter id="dryer-shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#02070c" flood-opacity="0.4"/>
    </filter>
    <filter id="dryer-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <g opacity="0.6" fill="none" stroke-linecap="round">
    <path d="M107 144c18-18 18-38 0-56" stroke="#ff9d2f" stroke-width="8"/>
    <path d="M139 155c25-24 25-52 0-76" stroke="#ef4b33" stroke-width="6"/>
    <path d="M550 349c20-18 20-42 0-60" stroke="#ff9d2f" stroke-width="7"/>
  </g>

  <ellipse cx="344" cy="468" rx="171" ry="25" fill="#000000" opacity="0.24"/>
  <circle cx="335" cy="318" r="136" fill="#ff7a2b" opacity="0.16" filter="url(#dryer-glow)"/>

  <g filter="url(#dryer-shadow)">
    <path d="M459 59 504 82v323l-45 38z" fill="url(#dryer-side)" stroke="#171f26" stroke-width="8" stroke-linejoin="round"/>
    <rect x="178" y="52" width="291" height="392" rx="25" fill="url(#dryer-case)" stroke="#171f26" stroke-width="9"/>
    <path d="M183 76c0-11 9-20 20-20h241c11 0 20 9 20 20v87H183z" fill="url(#dryer-panel)"/>
