<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="100%" height="100%" aria-label="Icono Secadora">
  <defs>
    <linearGradient id="dr-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff8f3"/>
    </linearGradient>
    <linearGradient id="dr-door" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffb23c"/>
      <stop offset="100%" stop-color="#ff5138"/>
    </linearGradient>
    <linearGradient id="heat-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff5138" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#ffb23c" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#ff5138" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- Base Shadow -->
  <ellipse cx="340" cy="460" rx="140" ry="12" fill="#173b67" opacity="0.1"/>

  <!-- Main Body -->
  <rect x="200" y="70" width="280" height="370" rx="28" fill="url(#dr-bg)" stroke="#173b67" stroke-width="12"/>

  <!-- Control Panel Divider -->
  <line x1="200" y1="160" x2="480" y2="160" stroke="#173b67" stroke-width="8"/>

  <!-- Panel Controls -->
  <circle cx="250" cy="115" r="14" fill="#ffb23c"/>
  <rect x="290" y="103" width="70" height="24" rx="6" fill="#173b67"/>
  <rect x="300" y="111" width="30" height="8" rx="2" fill="#ffb23c"/>
  <circle cx="420" cy="115" r="18" fill="#ffffff" stroke="#173b67" stroke-width="6"/>
  <line x1="420" y1="115" x2="432" y2="108" stroke="#ff5138" stroke-width="5" stroke-linecap="round"/>

  <!-- Door Outer Ring -->
  <circle cx="340" cy="305" r="105" fill="none" stroke="url(#dr-door)" stroke-width="18"/>
  <circle cx="340" cy="305" r="95" fill="#ffb23c" opacity="0.05"/>

  <!-- Door Glass Inner -->
  <circle cx="340" cy="305" r="86" fill="#ffffff" stroke="#173b67" stroke-width="6"/>

  <!-- Heat Waves Inside Drum -->
  <path d="M280 280 Q 310 260 340 280 T 400 280" stroke="url(#heat-grad)" stroke-width="10" stroke-linecap="round" fill="none"/>
  <path d="M270 310 Q 310 290 340 310 T 410 310" stroke="url(#heat-grad)" stroke-width="12" stroke-linecap="round" fill="none"/>
  <path d="M285 340 Q 315 320 345 340 T 395 340" stroke="url(#heat-grad)" stroke-width="10" stroke-linecap="round" fill="none"/>

  <!-- Rotation Arrow Indicator -->
  <path d="M 390 240 A 70 70 0 0 1 410 320" fill="none" stroke="#ff5138" stroke-width="8" stroke-linecap="round"/>
  <polygon points="418,328 400,320 415,305" fill="#ff5138"/>

  <!-- Shiny Glass Reflection -->
  <path d="M280 250 A 80 80 0 0 1 380 240 A 86 86 0 0 0 280 250 Z" fill="#ffffff" opacity="0.8"/>
</svg>
