      <path d="M240 314c18-54 71-82 122-62 42 16 64 67 42 109-30 57-118 61-159 11-17-20-18-38-5-58z" fill="#fff0cc" opacity="0.32"/>
      <path d="M260 338c24-40 45-54 71-38 27 17 48 8 66-17 2 56-26 92-71 96-31 3-53-11-66-41z" fill="#ffe35b" opacity="0.82"/>
      <path d="M262 273c28-21 47-19 64 5 19 26 43 31 70 14-15-48-54-77-94-65-18 5-31 21-40 46z" fill="#ef4b33" opacity="0.83"/>
      <path d="M252 246c29-31 75-43 112-27" fill="none" stroke="#ffffff" stroke-width="11" stroke-linecap="round" opacity="0.52"/>
      <g fill="#fff5da" opacity="0.5">
