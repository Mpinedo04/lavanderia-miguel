        <circle cx="311" cy="248" r="4"/>
        <circle cx="365" cy="268" r="4"/>
        <circle cx="386" cy="322" r="4"/>
        <circle cx="321" cy="355" r="4"/>
      </g>
    </g>

    <path d="M397 250a77 77 0 0 1 16 88" fill="none" stroke="#fff6d9" stroke-width="8" stroke-linecap="round"/>
    <path d="m404 344 20-4-7-19z" fill="#fff6d9"/>
    <rect x="214" y="414" width="55" height="11" rx="5.5" fill="#171f26" opacity="0.85"/>
    <rect x="397" y="414" width="37" height="11" rx="5.5" fill="#171f26" opacity="0.85"/>
  </g>

  <g transform="translate(112 358)">
    <path d="M13 23h93l-12 66H25z" fill="#ef4b33" stroke="#171f26" stroke-width="7" stroke-linejoin="round"/>
    <path d="M7 23h105" stroke="#171f26" stroke-width="8" stroke-linecap="round"/>
    <path d="M31 23c3-19 13-28 28-28s25 9 28 28" fill="none" stroke="#171f26" stroke-width="7"/>
    <path d="M38 45h44M34 62h50" stroke="#ffd53d" stroke-width="6" stroke-linecap="round"/>
