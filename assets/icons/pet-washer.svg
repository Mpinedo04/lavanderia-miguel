<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" role="img" aria-labelledby="pet-title pet-desc">
  <title id="pet-title">Lavadora para textiles de mascotas</title>
  <desc id="pet-desc">Lavadora exclusiva con huella, manta y accesorios para mascotas</desc>
  <defs>
    <linearGradient id="pet-case" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.6" stop-color="#f9fcfb"/>
      <stop offset="1" stop-color="#dbe8e7"/>
    </linearGradient>
    <linearGradient id="pet-side" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff8b51"/>
      <stop offset="1" stop-color="#d9362b"/>
    </linearGradient>
    <linearGradient id="pet-panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#102f55"/>
      <stop offset="0.58" stop-color="#006d91"/>
      <stop offset="1" stop-color="#17c9d6"/>
    </linearGradient>
    <radialGradient id="pet-glass" cx="38%" cy="29%" r="78%">
      <stop offset="0" stop-color="#eaffff"/>
      <stop offset="0.4" stop-color="#7be4e7"/>
      <stop offset="0.75" stop-color="#1498b6"/>
      <stop offset="1" stop-color="#083954"/>
    </radialGradient>
    <linearGradient id="pet-ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff7d6"/>
      <stop offset="0.3" stop-color="#ff9a4f"/>
      <stop offset="0.62" stop-color="#ef4938"/>
      <stop offset="1" stop-color="#ae2033"/>
    </linearGradient>
    <filter id="pet-shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#4f2418" flood-opacity="0.22"/>
    </filter>
    <filter id="pet-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="13"/>
    </filter>
  </defs>

