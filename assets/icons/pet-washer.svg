<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="100%" height="100%" aria-label="Icono Lavadora Mascotas">
  <defs>
    <linearGradient id="pet-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#fff5f2"/>
    </linearGradient>
    <linearGradient id="pet-door" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff5138"/>
      <stop offset="100%" stop-color="#ffb23c"/>
    </linearGradient>
  </defs>

  <!-- Base Shadow -->
  <ellipse cx="340" cy="460" rx="140" ry="12" fill="#173b67" opacity="0.1"/>

  <!-- Main Body -->
  <rect x="200" y="70" width="280" height="370" rx="28" fill="url(#pet-bg)" stroke="#ff5138" stroke-width="12"/>

  <!-- Control Panel Divider -->
  <line x1="200" y1="160" x2="480" y2="160" stroke="#ff5138" stroke-width="8"/>

  <!-- Panel Controls -->
  <circle cx="250" cy="115" r="14" fill="#ff5138"/>
  <rect x="290" y="103" width="70" height="24" rx="6" fill="#173b67"/>
  <rect x="300" y="111" width="30" height="8" rx="2" fill="#ff5138"/>
  <circle cx="420" cy="115" r="18" fill="#ffffff" stroke="#ff5138" stroke-width="6"/>
  <line x1="420" y1="115" x2="420" y2="103" stroke="#173b67" stroke-width="5" stroke-linecap="round"/>

  <!-- Door Outer Ring -->
  <circle cx="340" cy="305" r="105" fill="none" stroke="url(#pet-door)" stroke-width="18"/>
  <circle cx="340" cy="305" r="95" fill="#ff5138" opacity="0.06"/>

  <!-- Door Glass Inner -->
  <circle cx="340" cy="305" r="86" fill="#ffffff" stroke="#173b67" stroke-width="6"/>

  <!-- Paw Print inside Door Glass -->
  <g fill="#ff5138">
    <!-- Main Pad -->
    <path d="M 340 295 C 320 295, 310 325, 325 340 C 333 348, 347 348, 355 340 C 370 325, 360 295, 340 295 Z"/>
    <!-- Toe Pads -->
    <ellipse cx="312" cy="285" rx="11" ry="16" transform="rotate(-25 312 285)"/>
    <ellipse cx="330" cy="272" rx="11" ry="16" transform="rotate(-8 330 272)"/>
    <ellipse cx="350" cy="272" rx="11" ry="16" transform="rotate(8 350 272)"/>
    <ellipse cx="368" cy="285" rx="11" ry="16" transform="rotate(25 368 285)"/>
  </g>

  <!-- Shiny Glass Reflection -->
  <path d="M280 250 A 80 80 0 0 1 380 240 A 86 86 0 0 0 280 250 Z" fill="#ffffff" opacity="0.8"/>
</svg>