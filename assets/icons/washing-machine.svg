<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" width="100%" height="100%" aria-label="Icono Lavadora">
  <defs>
    <linearGradient id="wm-bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef8fc"/>
    </linearGradient>
    <linearGradient id="wm-door" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1db8d4"/>
      <stop offset="100%" stop-color="#173b67"/>
    </linearGradient>
    <linearGradient id="wm-water" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#1db8d4" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#7ed4ff" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Base Shadow -->
  <ellipse cx="340" cy="460" rx="140" ry="12" fill="#173b67" opacity="0.1"/>

  <!-- Main Body -->
  <rect x="200" y="70" width="280" height="370" rx="28" fill="url(#wm-bg)" stroke="#173b67" stroke-width="12"/>

  <!-- Control Panel Divider -->
  <line x1="200" y1="160" x2="480" y2="160" stroke="#173b67" stroke-width="8"/>

  <!-- Panel Controls -->
  <circle cx="250" cy="115" r="14" fill="#ff5138"/>
  <rect x="290" y="103" width="70" height="24" rx="6" fill="#173b67"/>
  <rect x="300" y="111" width="30" height="8" rx="2" fill="#1db8d4"/>
  <circle cx="420" cy="115" r="18" fill="#ffffff" stroke="#173b67" stroke-width="6"/>
  <line x1="420" y1="115" x2="420" y2="103" stroke="#ff5138" stroke-width="5" stroke-linecap="round"/>

  <!-- Door Outer Ring -->
  <circle cx="340" cy="305" r="105" fill="none" stroke="url(#wm-door)" stroke-width="18"/>
  <circle cx="340" cy="305" r="95" fill="#173b67" opacity="0.05"/>

  <!-- Door Glass Inner -->
  <circle cx="340" cy="305" r="86" fill="#ffffff" stroke="#173b67" stroke-width="6"/>

  <!-- Water inside Drum -->
  <path d="M258 320 C 280 300, 310 330, 340 315 C 370 300, 400 330, 422 320 L 422 375 A 86 86 0 0 1 258 375 Z" fill="url(#wm-water)"/>

  <!-- Bubbles -->
  <circle cx="300" cy="275" r="8" fill="#1db8d4" opacity="0.6"/>
  <circle cx="365" cy="265" r="12" fill="#7ed4ff" opacity="0.7"/>
  <circle cx="385" cy="290" r="6" fill="#1db8d4" opacity="0.5"/>

  <!-- Shiny Glass Reflection -->
  <path d="M280 250 A 80 80 0 0 1 380 240 A 86 86 0 0 0 280 250 Z" fill="#ffffff" opacity="0.8"/>
</svg>