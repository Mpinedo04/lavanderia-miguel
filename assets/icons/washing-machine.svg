<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 520" role="img" aria-labelledby="wash-title wash-desc">
  <title id="wash-title">Lavadora autoservicio</title>
  <desc id="wash-desc">Lavadora frontal moderna con agua y burbujas en el tambor</desc>
  <defs>
    <linearGradient id="wash-case" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.58" stop-color="#f7fbfd"/>
      <stop offset="1" stop-color="#d8e7ef"/>
    </linearGradient>
    <linearGradient id="wash-side" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c7dce8"/>
      <stop offset="1" stop-color="#8db1c6"/>
    </linearGradient>
    <linearGradient id="wash-panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#163d68"/>
      <stop offset="1" stop-color="#0b6ba0"/>
    </linearGradient>
    <radialGradient id="wash-glass" cx="36%" cy="28%" r="78%">
      <stop offset="0" stop-color="#bff7ff"/>
      <stop offset="0.36" stop-color="#41cee8"/>
      <stop offset="0.72" stop-color="#0785bb"/>
      <stop offset="1" stop-color="#063963"/>
    </radialGradient>
    <linearGradient id="wash-water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#72e7f5"/>
      <stop offset="1" stop-color="#0ba4d2"/>
    </linearGradient>
    <linearGradient id="wash-metal" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.28" stop-color="#a9c6d6"/>
      <stop offset="0.55" stop-color="#f8fcff"/>
      <stop offset="1" stop-color="#789aaf"/>
    </linearGradient>
    <clipPath id="wash-drum-clip">
      <circle cx="329" cy="307" r="104"/>
    </clipPath>
    <filter id="wash-shadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="12" flood-color="#062946" flood-opacity="0.22"/>
    </filter>
    <filter id="wash-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="11"/>
    </filter>
  </defs>

